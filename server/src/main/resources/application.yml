spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/guiderun?serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:guiderun}
    password: ${DB_PASSWORD:guiderun_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 4MB

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-not-for-production-must-be-at-least-32-characters-long}
    access-token-expiry-ms: 604800000   # 7 days（阶段 1 简化，避免演示时过期）
    refresh-token-expiry-days: 30

guiderun:
  upload:
    base-dir: uploads

server:
  port: 8080
